apiVersion: 1

# Grafana Alert Rules — SOA Tourism
# Automatski se učitavaju kroz provisioning
# Prikazuju se u Grafana UI pod Alerting > Alert Rules

groups:
  - orgId: 1
    name: "Host Machine Alerts"
    folder: "SOA Tourism"
    interval: 1m
    rules:
      - uid: alert-cpu-high
        title: "⚠ Visoka iskorišćenost CPU-a (> 85%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "PBFA97CFB590B2093"
            model:
              expr: "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params:
                      - 85
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "-100"
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "CPU iskorišćenost je iznad 85% već 2 minuta"
          description: "Host mašina je pod visokim opterećenjem. Provjeri procese."
        labels:
          severity: warning
          team: soa-tourism

      - uid: alert-ram-high
        title: "⚠ Visoka iskorišćenost RAM-a (> 90%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "PBFA97CFB590B2093"
            model:
              expr: "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params:
                      - 90
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "-100"
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "RAM iskorišćenost je iznad 90% već 2 minuta"
          description: "Sistem je blizu limita memorije. Moguć OOM killer."
        labels:
          severity: critical
          team: soa-tourism

      - uid: alert-disk-full
        title: "🔴 Disk skoro pun (> 85%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "PBFA97CFB590B2093"
            model:
              expr: "100 - ((node_filesystem_avail_bytes{fstype!~\"tmpfs|fuse.lxcfs|squashfs\",mountpoint=\"/\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|fuse.lxcfs|squashfs\",mountpoint=\"/\"}) * 100)"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params:
                      - 85
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: "__expr__"
                uid: "-100"
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Disk / je popunjen više od 85%"
          description: "Potrebno čišćenje disk prostora ili proširivanje particije."
        labels:
          severity: warning
          team: soa-tourism
