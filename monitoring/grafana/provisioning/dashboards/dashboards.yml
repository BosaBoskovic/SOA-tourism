apiVersion: 1

providers:
  - name: "SOA Tourism Dashboards"
    orgId: 1
    folder: "SOA Tourism"
    folderUid: "soa-tourism"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
