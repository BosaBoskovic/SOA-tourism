<nav class="navbar">
  <div class="navbar-content">
    <a class="brand" routerLink="/dashboard">
      <div class="brand-icon">✦</div>
      <div>
        <h1>Tourism App</h1>
        <span>Explore. Create. Manage.</span>
      </div>
    </a>

    <div class="menu-wrapper" *ngIf="currentUser">
      <div class="user-box">
        <span class="username">{{ currentUser.username }}</span>

        <button class="dropdown-toggle" type="button" (click)="toggleMenu()">
          ☰
        </button>
      </div>

      <div class="dropdown-menu" [class.show]="menuOpen">
        <a
          routerLink="/profile"
          *ngIf="currentUser.role === 'tourist' || currentUser.role === 'guide'"
          (click)="menuOpen = false"
        >
          Profil
        </a>

        <a
          routerLink="/users/search"
          *ngIf="currentUser.role === 'tourist' || currentUser.role === 'guide'"
          (click)="menuOpen = false"
        >
          Pretrazi korisnike
        </a>

        <a
          routerLink="/tours"
          *ngIf="currentUser.role === 'guide'"
          (click)="menuOpen = false"
        >
          Moje ture
        </a>

        <a
          routerLink="/tours"
          *ngIf="currentUser.role === 'tourist'"
          (click)="menuOpen = false"
        >
          Pretrazi ture
        </a>

        <a
          routerLink="/cart"
          *ngIf="currentUser.role === 'tourist'"
          (click)="menuOpen = false"
          class="cart-link"
        >
          Korpa
          <span *ngIf="cartItemCount > 0" class="cart-badge">{{ cartItemCount }}</span>
        </a>

        <a routerLink="/position-simulator" *ngIf="currentUser?.role === 'tourist'">
          Trenutna lokacija
        </a>

        <a routerLink="/blog" (click)="menuOpen = false">
          Blog
        </a>

        <a *ngIf="currentUser.role === 'admin'" (click)="menuOpen = false">
          Administracija
        </a>

        <button type="button" (click)="logout()">
          Odjava
        </button>
      </div>
    </div>
  </div>
</nav>
