<div class="profile-container">
  <div class="profile-card">
    <h2>Moj profil</h2>

    <p *ngIf="loading">Učitavanje...</p>
    <p *ngIf="error" class="alert-error">{{ error }}</p>
    <p *ngIf="success" class="alert-success">{{ success }}</p>

    <div *ngIf="profile && !editMode" class="profile-view">
      <img *ngIf="profile.imageURL" [src]="profile.imageURL" alt="Profilna slika" class="profile-img" />
      <div *ngIf="!profile.imageURL" class="profile-img-placeholder">{{ profile.username[0]?.toUpperCase() }}</div>

      <h3>{{ profile.firstName }} {{ profile.lastName }}</h3>
      <p class="username">@{{ profile.username }}</p>
      <p *ngIf="profile.motto" class="motto">"{{ profile.motto }}"</p>
      <p *ngIf="profile.bio" class="bio">{{ profile.bio }}</p>

      <button class="btn btn-primary" (click)="toggleEdit()">Uredi profil</button>
    </div>

    <form *ngIf="editMode" [formGroup]="profileForm" (ngSubmit)="onSave()">
      <div class="form-group">
        <label>Ime</label>
        <input class="form-control" formControlName="firstName" />
      </div>
      <div class="form-group">
        <label>Prezime</label>
        <input class="form-control" formControlName="lastName" />
      </div>
      <div class="form-group">
  <label>Profilna slika</label>

  <input
    class="form-control"
    type="file"
    accept="image/*"
    (change)="onProfileImageSelected($event)"
  />

  <img
    *ngIf="profileForm.value.imageURL"
    [src]="profileForm.value.imageURL"
    class="profile-img-preview"
  />
</div>
      <div class="form-group">
        <label>Biografija</label>
        <textarea class="form-control" formControlName="bio" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Moto / citat</label>
        <input class="form-control" formControlName="motto" />
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="saving">
          {{ saving ? 'Čuvanje...' : 'Sačuvaj' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="toggleEdit()">Otkaži</button>
      </div>
    </form>
  </div>
</div>
