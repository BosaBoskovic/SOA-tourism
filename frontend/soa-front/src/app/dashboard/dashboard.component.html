<div class="dashboard-container">
  <nav class="navbar">
    <div class="navbar-content">
      <h1>Tourism App</h1>
      <div *ngIf="currentUser" class="user-info">
        <span>Dobrodošli, {{ currentUser.username }}!</span>
        <button class="btn btn-secondary" (click)="logout()">Odjava</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-content">
    <div class="welcome-card">
      <h2>Dobrodošli na dashboard</h2>
      <p *ngIf="currentUser">
        <strong>Korisnik:</strong> {{ currentUser.username }}<br>
        <strong>Email:</strong> {{ currentUser.email }}<br>
        <strong>Uloga:</strong> {{ currentUser.role }}
      </p>
      <p>Ovo je osnovni dashboard. Ovdje možete dodati više sadržaja.</p>
    </div>
    <app-admin *ngIf="currentUser?.role === 'admin'"></app-admin>
  </div>
</div>
