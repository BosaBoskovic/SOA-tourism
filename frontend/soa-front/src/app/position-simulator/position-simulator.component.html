<div class="page-container">
  <h2>📍 Simulator pozicije</h2>

  <p class="hint">
    Klikni na mapu da postaviš svoju trenutnu lokaciju.
  </p>

  <div id="position-map" class="map"></div>

  <div class="position-card" *ngIf="currentPosition">
    <h3>Trenutna lokacija</h3>
    <p>
      Latitude:
      <strong>{{ currentPosition.latitude | number:'1.6-6' }}</strong>
    </p>
    <p>
      Longitude:
      <strong>{{ currentPosition.longitude | number:'1.6-6' }}</strong>
    </p>
  </div>

  <p *ngIf="!currentPosition" class="hint">
    Još nemaš definisanu trenutnu lokaciju.
  </p>
</div>
