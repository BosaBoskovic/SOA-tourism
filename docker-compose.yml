services:
  neo4j:
    image: neo4j:5
    container_name: soa-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4JLABS_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Bolt protokol
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - soa-network

  stakeholders:
    build:
      context: .
      dockerfile: services/stakeholders/Dockerfile
    container_name: soa-stakeholders
    ports:
      - "8081:8081"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      JWT_SECRET: super-secret-change-me-123456
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - soa-network

  mongodb-blog:
    image: mongo:7
    container_name: soa-mongodb-blog
    ports:
      - "27017:27017"
    volumes:
      - mongodb_blog_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soa-network

  mongo-express:
    image: mongo-express
    container_name: soa-mongo-express
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: soa-mongodb-blog
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb-blog
    networks:
      - soa-network

  blog:
    build:
      context: ./services/blog
      dockerfile: Dockerfile
    container_name: soa-blog
    ports:
      - "8082:8082"
      - "9095:9095"
    environment:
      MONGODB_URI: mongodb://soa-mongodb-blog:27017/blogdb
      MONGODB_DATABASE: blogdb
      FOLLOWER_SERVICE_URL: http://soa-followers:8084
    depends_on:
      followers:
        condition: service_started
      mongodb-blog:
        condition: service_healthy
    networks:
      - soa-network

  followers:
    build:
      context: ./services/followers
      dockerfile: Dockerfile
    container_name: soa-followers
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - soa-network

  mongodb-tours:
    image: mongo:7
    container_name: soa-mongodb-tours
    ports:
      - "27018:27017"         
    volumes:
      - mongodb_tours_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - soa-network

  tours:
    build:
      context: .
      dockerfile: services/tours/Dockerfile
    container_name: soa-tours
    ports:
      - "8085:8085"
      - "9093:9093"
    environment:
      MONGODB_URI: soa-mongodb-tours:27017
      PORT: 8085
      TOURS_GRPC_PORT: 9093
      PAYMENTS_URL: http://soa-payments:8086
      RABBITMQ_HOST: rabbitmq
      OTEL_SERVICE_NAME: tours-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://soa-jaeger:4318
    depends_on:
      mongodb-tours:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: on-failure
    networks:
      - soa-network

  # API GATEWAY - jedina ulazna tačka za sve klijente
  # Svi zahtjevi idu na :8080, gateway rutira dalje
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: soa-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      STAKEHOLDERS_URL: http://soa-stakeholders:8081
      STAKEHOLDERS_GRPC_URL: soa-stakeholders:9091
      BLOG_URL: http://soa-blog:8082
      FOLLOWERS_URL: http://soa-followers:8084
      TOURS_URL: http://soa-tours:8085
      TOURS_GRPC_URL: soa-tours:9093
      PAYMENTS_URL: http://soa-payments:8086
      PAYMENTS_GRPC_URL: soa-payments:9092
      BLOGS_GRPC_URL: soa-blog:9095
    depends_on:
      - stakeholders
      - blog
      - followers
      - tours
      - payments
    restart: on-failure
    networks:
      - soa-network


  postgres-payments:
    image: postgres:16
    container_name: soa-postgres-payments
    environment:
      POSTGRES_DB: paymentsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_payments_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paymentsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soa-network

  payments:
    build:
      context: ./services/payments
      dockerfile: Dockerfile
    container_name: soa-payments
    ports:
      - "8086:8086"
      - "9092:9092"
    environment:
      ASPNETCORE_URLS: http://+:8086;http://+:9092
      PAYMENTS_GRPC_PORT: 9092
      TOURS_URL: http://soa-tours:8085
      RABBITMQ_HOST: rabbitmq
      ConnectionStrings__DefaultConnection: "Host=soa-postgres-payments;Port=5432;Database=paymentsdb;Username=postgres;Password=postgres"
    depends_on:
      postgres-payments:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: on-failure
    networks:
      - soa-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: soa-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - soa-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: soa-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - soa-network

  prometheus:
    image: prom/prometheus:latest
    container_name: soa-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - soa-network

  grafana:
      image: grafana/grafana:latest
      container_name: soa-grafana
      ports:
        - "3001:3000"
      environment:
        GF_SECURITY_ADMIN_USER: admin
        GF_SECURITY_ADMIN_PASSWORD: admin
      volumes:
        - grafana_data:/var/lib/grafana
        - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      depends_on:
        - prometheus
        - loki
      networks:
        - soa-network

  loki:
      image: grafana/loki:latest
      container_name: soa-loki
      ports:
        - "3100:3100"
      command: -config.file=/etc/loki/loki-config.yml
      volumes:
        - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml
        - loki_data:/loki
      networks:
        - soa-network

  promtail:
      image: grafana/promtail:latest
      container_name: soa-promtail
      command: -config.file=/etc/promtail/promtail-config.yml
      volumes:
        - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml
        - /var/lib/docker/containers:/var/lib/docker/containers:ro
        - /var/log:/var/log:ro
        - promtail_positions:/tmp
      depends_on:
        - loki
      networks:
        - soa-network

  node-exporter:
      image: prom/node-exporter:latest
      container_name: soa-node-exporter
      ports:
        - "9100:9100"
      volumes:
        - /proc:/host/proc:ro
        - /sys:/host/sys:ro
        - /:/rootfs:ro
      command:
        - '--path.procfs=/host/proc'
        - '--path.sysfs=/host/sys'
        - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      networks:
        - soa-network

  cadvisor:
      image: gcr.io/cadvisor/cadvisor:latest
      container_name: soa-cadvisor
      ports:
        - "8089:8080"
      volumes:
        - /:/rootfs:ro
        - /var/run:/var/run:ro
        - /sys:/sys:ro
        - /var/lib/docker/:/var/lib/docker:ro
        - /dev/disk/:/dev/disk:ro
      privileged: true
      devices:
        - /dev/kmsg
      networks:
        - soa-network

volumes:
  neo4j_data:
  neo4j_import:
  mongodb_blog_data:
  mongodb_tours_data:
  postgres_payments_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:

networks:
  soa-network:
    driver: bridge