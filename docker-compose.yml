services:
  neo4j:
    image: neo4j:5
    container_name: soa-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4JLABS_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Bolt protokol
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soa-network

  stakeholders:
    build:
      context: ./services/stakeholders
      dockerfile: Dockerfile
    container_name: soa-stakeholders
    ports:
      - "8081:8081"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      JWT_SECRET: super-secret-change-me-123456
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - soa-network

  mongodb-blog:
    image: mongo:7
    container_name: soa-mongodb-blog
    ports:
      - "27017:27017"
    volumes:
      - mongodb_blog_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soa-network

  mongo-express:
    image: mongo-express
    container_name: soa-mongo-express
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: soa-mongodb-blog
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb-blog
    networks:
      - soa-network

  blog:
    build:
      context: ./services/blog
      dockerfile: Dockerfile
    container_name: soa-blog
    ports:
      - "8082:8082"
    environment:
      MONGODB_URI: mongodb://soa-mongodb-blog:27017/blogdb
      MONGODB_DATABASE: blogdb
      FOLLOWER_SERVICE_URL: http://soa-followers:8084
    depends_on:
      followers:
        condition: service_started
      mongodb-blog:
        condition: service_healthy
    networks:
      - soa-network

  followers:
    build:
      context: ./services/followers
      dockerfile: Dockerfile
    container_name: soa-followers
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - soa-network

  mongodb-tours:
    image: mongo:7
    container_name: soa-mongodb-tours
    ports:
      - "27018:27017"         
    volumes:
      - mongodb_tours_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soa-network

  tours:
    build:
      context: ./services/tours
      dockerfile: Dockerfile
    container_name: soa-tours
    ports:
      - "8085:8085"
    environment:
      MONGODB_URI: soa-mongodb-tours:27017  
      PORT: 8085
    depends_on:
      mongodb-tours:
        condition: service_healthy           
    networks:
      - soa-network

  # API GATEWAY - jedina ulazna tačka za sve klijente
  # Svi zahtjevi idu na :8080, gateway rutira dalje
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: soa-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      STAKEHOLDERS_URL: http://soa-stakeholders:8081
      BLOG_URL: http://soa-blog:8082
      FOLLOWERS_URL: http://soa-followers:8084
      TOURS_URL: http://soa-tours:8085
    depends_on:
      - stakeholders
      - blog
      - followers
      - tours
    networks:
      - soa-network

volumes:
  neo4j_data:
  neo4j_import:
  mongodb_blog_data:
  mongodb_tours_data:

networks:
  soa-network:
    driver: bridge